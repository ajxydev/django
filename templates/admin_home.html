{% include 'admin_header.html' %}
    <!-- Main -->
    <main class="main">
      <div class="main-inner">

        <!-- Welcome banner -->
        <div class="welcome-banner">
          <div class="welcome-banner-text">
            <h1>Welcome, Admin</h1>
            <p>Here's an overview of your platform</p>
          </div>
          <span class="admin-badge">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Administrator
          </span>
        </div>

        <!-- Stat cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card-icon blue">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <p class="stat-card-label">Total users</p>
            <p class="stat-card-value">{{ users.count }}</p>
          </div>

          <div class="stat-card">
            <div class="stat-card-icon green">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </div>
            <p class="stat-card-label">Total blogs</p>
            <p class="stat-card-value">{{ blogs.count }}</p>
          </div>
        </div>

        <!-- Quick actions -->
        <p class="section-title">Quick actions</p>
        <div class="actions-grid">

          <a href="{% url 'view_users' %}" class="action-card">
            <div class="action-card-icon blue">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div class="action-card-text">
              <h3>View users</h3>
              <p>Manage all accounts</p>
            </div>
          </a>

          <a href="{% url 'view_blogs_admin' %}" class="action-card">
            <div class="action-card-icon green">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </div>
            <div class="action-card-text">
              <h3>All blogs</h3>
              <p>Review all posts</p>
            </div>
          </a>

        </div>

      </div>
    </main>

  </div>

  

</body>
</html>
