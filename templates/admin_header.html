<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: #1a1a18;
      display: flex;
      flex-direction: column;
      padding: 2rem 0;
      flex-shrink: 0;
    }

    .sidebar-brand {
      padding: 0 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      margin-bottom: 1.5rem;
    }

    .sidebar-brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .sidebar-brand-icon svg {
      width: 20px;
      height: 20px;
      stroke: #f8f7f4;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sidebar-brand h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      font-weight: 400;
      color: #f8f7f4;
      letter-spacing: -0.2px;
    }

    .sidebar-brand p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 2px;
      font-weight: 300;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      padding: 0 1.5rem;
      margin-bottom: 0.5rem;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 0.75rem;
      margin-bottom: 1.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: rgba(255, 255, 255, 0.55);
      font-size: 14px;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.9);
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.1);
      color: #f8f7f4;
    }

    .nav-item svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke: currentColor;
      flex-shrink: 0;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 1.5rem 0.75rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: rgba(255, 100, 80, 0.7);
      font-size: 14px;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .logout-btn:hover {
      background: rgba(255, 80, 60, 0.08);
      color: rgba(255, 100, 80, 1);
    }

    .logout-btn svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke: currentColor;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-inner {
      flex: 1;
      padding: 3rem 2.5rem;
      max-width: 860px;
    }

    /* Welcome banner */
    .welcome-banner {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .welcome-banner-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #1a1a18;
      letter-spacing: -0.3px;
      margin-bottom: 0.3rem;
    }

    .welcome-banner-text p {
      font-size: 14px;
      color: #888780;
      font-weight: 300;
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a18;
      color: #f8f7f4;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .admin-badge svg {
      width: 12px;
      height: 12px;
      stroke: #f8f7f4;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Stat cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .stat-card-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .stat-card-icon.blue { background: #e8f0fb; }
    .stat-card-icon.green { background: #e8f5ee; }

    .stat-card-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .stat-card-icon.blue svg { stroke: #3b6bb5; }
    .stat-card-icon.green svg { stroke: #2e7d52; }

    .stat-card-label {
      font-size: 12px;
      color: #888780;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .stat-card-value {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: #1a1a18;
      letter-spacing: -0.3px;
    }

    /* Quick actions */
    .section-title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #5f5e5a;
      margin-bottom: 1rem;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .action-card {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 1.5rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .action-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.13);
    }

    .action-card:active {
      transform: scale(0.98);
    }

    .action-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .action-card-icon.blue { background: #e8f0fb; }
    .action-card-icon.green { background: #e8f5ee; }

    .action-card-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-card-icon.blue svg { stroke: #3b6bb5; }
    .action-card-icon.green svg { stroke: #2e7d52; }

    .action-card-text h3 {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 2px;
    }

    .action-card-text p {
      font-size: 12px;
      color: #888780;
      font-weight: 300;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .sidebar {
        display: none;
      }

      .welcome-banner {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h2>Admin Panel</h2>
        <p>Control dashboard</p>
      </div>

      <p class="sidebar-section-label">Manage</p>
      <nav class="sidebar-nav">
        <a href="{% url 'admin_home' %}" class="nav-item active">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Dashboard
        </a>
        <a href="{% url 'view_users' %}" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Users
        </a>
        <a href="{% url 'view_blogs_admin' %}" class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          All blogs
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="{% url 'logout' %}" class="logout-btn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </a>
      </div>

    </aside>
