<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      /* Soft off-white premium background mesh gradient */
      background: radial-gradient(at 0% 0%, #f6f3ee 0px, transparent 50%),
                  radial-gradient(at 100% 100%, #e3ecf5 0px, transparent 50%),
                  #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02),
                  0 10px 15px -3px rgba(0, 0, 0, 0.03),
                  0 20px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .icon-wrapper {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f8f7f4;
      border: 1px solid rgba(0, 0, 0, 0.05);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .icon-wrapper svg {
      width: 26px;
      height: 26px;
      stroke: #1a1a18;
      fill: none;
      stroke-width: 1.75;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      color: #1a1a18;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .subtext {
      font-size: 14px;
      color: #6e6d68;
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    /* Form Layout Elements */
    .form-group {
      position: relative;
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .form-control {
      width: 100%;
      padding: 1rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #1a1a18;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 12px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-control:focus {
      border-color: #1a1a18;
      box-shadow: 0 0 0 4px rgba(26, 26, 24, 0.05);
    }

    /* Primary Action Button */
    .btn-submit {
      width: 100%;
      padding: 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      background: #1a1a18;
      border: 1px solid #1a1a18;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s ease;
    }

    .btn-submit:hover {
      background: #2e2e2b;
      border-color: #2e2e2b;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(26, 26, 24, 0.15);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* Error Alert Design */
    .error-container {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background-color: #fdf2f2;
      border-left: 3px solid #de350b;
      border-radius: 6px;
      text-align: left;
    }

    .error-text {
      font-size: 13px;
      color: #de350b;
      font-weight: 500;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  {% include 'public_header.html' %}

  <div class="page-content">
    <div class="card">
      
      <div class="icon-wrapper">
        <svg viewBox="0 0 24 24" aria-hidden="true" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          <circle cx="12" cy="16" r="1"></circle>
        </svg>
      </div>

      <h1 class="title">Reset password</h1>
      <p class="subtext">Please choose a strong, unique password to secure your personal account details.</p>

      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <input type="password" 
                 name="password" 
                 class="form-control" 
                 placeholder="New Password" 
                 required 
                 autocomplete="new-password">
        </div>

        <div class="form-group">
          <input type="password" 
                 name="confirm_password" 
                 class="form-control" 
                 placeholder="Confirm Password" 
                 required 
                 autocomplete="new-password">
        </div>

        <button type="submit" class="btn-submit">
          Reset Password
        </button>

        {% if error %}
          <div class="error-container">
            <p class="error-text">{{ error }}</p>
          </div>
        {% endif %}
      </form>

    </div>
  </div>

  {% include 'footer.html' %}

</body>
</html>
