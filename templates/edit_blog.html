<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .card-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #e8f0fb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .icon-wrap svg {
      width: 26px;
      height: 26px;
      stroke: #3b6bb5;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      color: #1a1a18;
      letter-spacing: -0.3px;
      margin-bottom: 0.3rem;
    }

    .card-header p {
      font-size: 14px;
      color: #888780;
      font-weight: 300;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #5f5e5a;
      margin-bottom: 8px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1a1a18;
      background: #f8f7f4;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    textarea:focus {
      background: #ffffff;
      border-color: #3b6bb5;
      box-shadow: 0 0 0 3px rgba(59, 107, 181, 0.1);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.6;
    }

    /* Current image preview */
    .current-image-wrap {
      margin-bottom: 10px;
    }

    .current-image-wrap p {
      font-size: 12px;
      color: #888780;
      margin-bottom: 8px;
    }

    .current-image-wrap img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      display: block;
    }

    /* File upload */
    .file-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: #f8f7f4;
      border: 1px dashed rgba(0, 0, 0, 0.15);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .file-label:hover {
      background: #f0ede8;
      border-color: rgba(0, 0, 0, 0.22);
    }

    .file-label svg {
      width: 20px;
      height: 20px;
      stroke: #888780;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .file-label span {
      font-size: 14px;
      color: #888780;
    }

    input[type="file"] {
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(0, 0, 0, 0.07);
      margin: 2rem 0 1.75rem;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .submit-btn {
      padding: 13px;
      background: #1a1a18;
      color: #f8f7f4;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .submit-btn:hover {
      background: #2c2c2a;
    }

    .submit-btn:active {
      transform: scale(0.99);
    }

    .cancel-btn {
      padding: 13px;
      background: #f8f7f4;
      color: #444441;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }

    .cancel-btn:hover {
      background: #f0ede8;
    }

    .cancel-btn:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>

  {% include 'user_header.html' %}

  <div class="page-content">
    <div class="card">

      <div class="card-header">
        <div class="icon-wrap">
          <!-- edit icon -->
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <h2>Edit blog post</h2>
        <p>Update your content below</p>
      </div>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" value="{{ blogs.title }}" placeholder="Post title">
        </div>

        <div class="field">
          <label for="content">Content</label>
          <textarea id="content" name="content" placeholder="Write your content…">{{ blogs.content }}</textarea>
        </div>

        <div class="field">
          <label>Image</label>
          {% if blogs.image %}
            <div class="current-image-wrap">
              <p>Current image</p>
              <img src="{{ blogs.image.url }}" alt="Current blog image">
            </div>
          {% endif %}
          <label class="file-label" for="image">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            <span id="file-name">Replace image…</span>
          </label>
          <input type="file" id="image" name="image" accept="image/*">
        </div>

        <hr class="divider">

        <div class="btn-row">
          <a href="{% url 'my_blogs' %}" class="cancel-btn">Cancel</a>
          <button type="submit" class="submit-btn">Save changes</button>
        </div>

      </form>
    

    </div>
  </div>

  

  <script>
    document.getElementById('image').addEventListener('change', function () {
      const name = this.files[0] ? this.files[0].name : 'Replace image…';
      document.getElementById('file-name').textContent = name;
    });
  </script>

</body>
</html>
